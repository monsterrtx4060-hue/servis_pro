name: servis_pro
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  cupertino_icons: ^1.0.8
  intl: ^0.18.0
  pdf: ^3.10.7
  printing: ^5.12.0
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.2
  call_log: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/splash.png
    - assets/fonts/DejaVuSans.ttf
    - assets/fonts/DejaVuSans-Bold.ttf

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

